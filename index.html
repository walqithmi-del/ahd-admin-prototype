<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ahd — Administrator Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#101828;--sub:#344054;--mut:#667085;--faint:#98A2B3;--line:#EAECF0;--line2:#F2F4F7;--bg:#F9FAFB;
  --b900:#2C1C4A;--b800:#3E2A5E;--brand:#6941C6;--b600:#7F56D9;--b100:#F4EBFF;--b50:#F9F5FF;--b200:#E9D7FE;
  --green:#067647;--green-bg:#ECFDF3;--green-bd:#ABEFC6;
  --amber:#B54708;--amber-bg:#FFFAEB;--amber-bd:#FEDF89;
  --red:#B42318;--red-bg:#FEF3F2;--red-bd:#FECDCA;
  --blue:#175CD3;--blue-bg:#EFF8FF;--blue-bd:#B2DDFF;
  --sh:0 1px 2px rgba(16,24,40,.05);
  --sh2:0 12px 16px -4px rgba(16,24,40,.1),0 4px 6px -2px rgba(16,24,40,.04);
}
html,body{height:100%}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--ink);background:#fff;font-size:14px;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
input,select,textarea{font:inherit;color:var(--ink)}
::placeholder{color:var(--faint)}
.app{display:flex;height:100vh;overflow:hidden}
/* ---------- sidebar ---------- */
.sb{width:250px;min-width:250px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#fff}
.sb-logo{padding:20px 20px 10px;display:flex;align-items:center;gap:10px}
.logo-word{font-size:23px;font-weight:600;letter-spacing:-.02em}
.logo-ar{font-size:19px;font-weight:600}
.adm-badge{font-size:10.5px;font-weight:700;letter-spacing:.06em;background:var(--b100);color:var(--brand);border-radius:6px;padding:2px 7px;margin-left:auto}
.sb-nav{flex:1;overflow-y:auto;padding:6px 14px 16px}
.sb-sec{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;margin:18px 10px 6px}
.sb-item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;border-radius:8px;color:var(--sub);font-weight:500;margin-bottom:2px;text-align:left;font-size:13.5px}
.sb-item:hover{background:var(--b50)}
.sb-item.on{background:var(--b800);color:#fff}
.sb-item svg{flex-shrink:0;opacity:.85}
.sb-item .cnt{margin-left:auto;font-size:11px;background:var(--b50);color:var(--brand);border-radius:99px;padding:1px 7px;font-weight:600}
.sb-item.on .cnt{background:rgba(255,255,255,.18);color:#fff}
.sb-foot{padding:14px 20px;border-top:1px solid var(--line);font-size:12px;color:var(--mut);line-height:1.7}
.sb-foot a{color:var(--sub);font-weight:600;text-decoration:none}
/* ---------- main / topbar ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.tb{height:64px;min-height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 24px;background:#fff;z-index:40}
.gsearch{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:8px;padding:8px 12px;width:360px;color:var(--faint);background:#fff;box-shadow:var(--sh)}
.gsearch input{border:none;outline:none;flex:1;background:transparent}
.kbd{font-size:11px;border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--faint)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0;letter-spacing:.02em}
.ibtn{width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--mut);position:relative}
.ibtn:hover{background:var(--bg)}
.ibtn .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:#F04438;border:1.5px solid #fff}
.tb-sep{width:1px;height:24px;background:var(--line);margin:0 4px}
.ct{flex:1;overflow-y:auto;padding:26px 32px 72px;scroll-behavior:smooth}
/* ---------- typography / headers ---------- */
.ph{display:flex;align-items:flex-start;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:600;letter-spacing:-.01em}
.psub{color:var(--mut);font-size:13.5px;margin-top:4px}
.ph-actions{margin-left:auto;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.crumb{font-size:13.5px;color:var(--mut);display:flex;align-items:center;gap:7px;margin-bottom:14px}
.crumb a{color:var(--mut);text-decoration:none;cursor:pointer;display:flex;align-items:center;gap:6px}
.crumb a:hover{color:var(--brand)}
.crumb b{color:var(--ink);font-weight:600}
h3.sec{font-size:15px;font-weight:600;margin:26px 0 12px}
/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid #D0D5DD;background:#fff;border-radius:8px;padding:8px 14px;font-weight:600;color:var(--sub);box-shadow:var(--sh);white-space:nowrap;font-size:13.5px}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.pri:hover{background:#5b37ab}
.btn.dark{background:var(--b800);border-color:var(--b800);color:#fff}
.btn.ghost{border:none;box-shadow:none;color:var(--mut);background:transparent}
.btn.ghost:hover{background:var(--bg);color:var(--sub)}
.btn.danger{color:var(--red);border-color:var(--red-bd)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:7px}
.btn.xs{padding:4px 9px;font-size:12.5px;border-radius:6px;box-shadow:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.link{color:var(--brand);font-weight:600;cursor:pointer}
.link:hover{text-decoration:underline}
/* ---------- chips / tags ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;border-radius:99px;padding:2px 9px;border:1px solid var(--line);background:var(--bg);color:var(--sub);white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%;background:var(--mut);flex-shrink:0}
.chip.green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}.chip.green .d{background:#17B26A}
.chip.amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}.chip.amber .d{background:#F79009}
.chip.red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}.chip.red .d{background:#F04438}
.chip.blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}.chip.blue .d{background:#2E90FA}
.chip.purple{background:var(--b50);border-color:var(--b200);color:var(--brand)}.chip.purple .d{background:var(--b600)}
.tag{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--sub);margin:0 4px 4px 0}
/* ---------- tabs / pills ---------- */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto}
.tab{padding:11px 15px;color:var(--mut);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-size:14px}
.tab:hover{color:var(--sub)}
.tab.on{color:var(--b800);border-color:var(--brand);font-weight:600}
.tab .cnt{font-size:11px;background:var(--bg);border:1px solid var(--line);color:var(--mut);border-radius:99px;padding:1px 7px;margin-left:6px;font-weight:600}
.tab.on .cnt{background:var(--b50);border-color:var(--b200);color:var(--brand)}
.pills{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:8px;font-weight:500;color:var(--mut);border:1px solid transparent;font-size:13.5px}
.pill:hover{background:var(--bg)}
.pill.on{background:var(--bg);border-color:var(--line);color:var(--ink);font-weight:600}
.pill .n{font-size:11px;background:var(--b50);color:var(--brand);padding:1px 7px;border-radius:99px;font-weight:600}
.pill.on .n{background:var(--b800);color:#fff}
/* ---------- cards / tables ---------- */
.card{border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--sh)}
.chd{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.chd .t{font-weight:600;font-size:14.5px}
.chd .s{color:var(--mut);font-size:12.5px;margin-top:2px}
.cbody{padding:20px}
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh)}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;background:#fff}
.tbl th{text-align:left;font-size:12px;font-weight:600;color:var(--mut);padding:11px 16px;background:var(--bg);border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--line2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#FCFCFD}
.tbl .clk{cursor:pointer}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* ---------- stats ---------- */
.stat{border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:#fff;box-shadow:var(--sh)}
.stat .sl{font-size:13px;color:var(--mut);font-weight:500}
.stat .sv{font-size:26px;font-weight:600;margin-top:6px;letter-spacing:-.01em}
.stat .sd{font-size:12px;margin-top:7px;font-weight:600;color:var(--mut)}
.up{color:var(--green)}.dn{color:var(--red)}
/* ---------- forms ---------- */
.fld{margin-bottom:16px}
.fld>label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:6px}
.fld>label .req{color:var(--brand)}
.in,.sel,.ta{width:100%;border:1px solid #D0D5DD;border-radius:8px;padding:9px 12px;box-shadow:var(--sh);outline:none;background:#fff;font-size:13.5px}
.ta{min-height:88px;resize:vertical;line-height:1.55}
.in:focus,.ta:focus,.sel:focus{border-color:var(--b600);box-shadow:0 0 0 4px var(--b100)}
.hint{font-size:12px;color:var(--mut);margin-top:5px}
.err .in,.err .ta{border-color:#FDA29B;box-shadow:0 0 0 4px var(--red-bg)}
.errmsg{color:var(--red);font-size:12px;margin-top:5px;font-weight:500}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cb{width:16px;height:16px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.chkrow{display:flex;gap:11px;align-items:flex-start;padding:13px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:.12s}
.chkrow:hover{border-color:var(--b200)}
.chkrow.on{border-color:var(--b600);background:var(--b50)}
.chkrow .ct2{flex:1}
.chkrow b{font-size:13.5px;font-weight:600;display:block}
.chkrow .s{font-size:12.5px;color:var(--mut);margin-top:2px;line-height:1.5}
/* ---------- switch ---------- */
.sw{position:relative;width:36px;height:20px;border-radius:99px;background:#EAECF0;transition:.15s;flex-shrink:0;cursor:pointer;display:inline-block;vertical-align:middle}
.sw.on{background:var(--brand)}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:var(--sh);transition:.15s}
.sw.on::after{left:18px}
.swrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line2)}
.swrow:last-child{border-bottom:none}
.swrow b{font-size:13.5px;font-weight:600;display:block}
.swrow .s{font-size:12.5px;color:var(--mut);margin-top:2px}
.swrow .sw{margin-left:auto}
/* ---------- segmented ---------- */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:var(--sh)}
.seg button{padding:6px 15px;font-weight:600;color:var(--mut);background:#fff;font-size:13px;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--b50);color:var(--brand)}
/* ---------- dropdown ---------- */
.dd{position:relative;display:inline-block}
.dd>summary{list-style:none;cursor:pointer;display:inline-flex}
.dd>summary::-webkit-details-marker{display:none}
.dd-menu{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--sh2);min-width:210px;padding:5px;z-index:70}
.dd-menu.left{right:auto;left:0}
.dd-menu button{display:flex;width:100%;text-align:left;padding:8px 10px;border-radius:7px;gap:10px;align-items:center;color:var(--sub);font-weight:500;font-size:13.5px}
.dd-menu button:hover{background:var(--bg)}
.dd-menu button.dgr{color:var(--red)}
.dd-menu .sep{height:1px;background:var(--line);margin:4px 2px}
.dd-menu .lbl{font-size:11px;color:var(--faint);font-weight:600;padding:6px 10px 2px;text-transform:uppercase;letter-spacing:.04em}
.mbtn{width:30px;height:30px;border:1px solid var(--line);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--mut);background:#fff;font-weight:700;letter-spacing:1px;font-size:13px}
.mbtn:hover{background:var(--bg)}
/* ---------- modal ---------- */
#ovl{position:fixed;inset:0;background:rgba(16,24,40,.55);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:44px 20px}
#ovl.show{display:flex}
.modal{background:#fff;border-radius:14px;width:600px;max-width:100%;box-shadow:var(--sh2);animation:pop .16s ease}
.modal.wide{width:900px}
.modal.narrow{width:460px}
.mhd{padding:18px 22px 16px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.mhd .t{font-size:16.5px;font-weight:600}
.mhd .s{color:var(--mut);font-size:13px;margin-top:3px;line-height:1.5}
.mx{margin-left:auto;color:var(--faint);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mx:hover{background:var(--bg);color:var(--sub)}
.mbody{padding:22px;max-height:calc(100vh - 250px);overflow-y:auto}
.mft{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;align-items:center}
.mft .lft{margin-right:auto}
@keyframes pop{from{transform:scale(.97) translateY(4px);opacity:0}}
/* ---------- toast ---------- */
#toasts{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;box-shadow:var(--sh2);font-weight:500;display:flex;gap:10px;align-items:center;animation:pop .2s ease;font-size:13.5px;pointer-events:auto}
.toast svg{color:#75E0A7}
.toast.err{background:#912018}
.toast.err svg{color:#FDA29B}
.toast .act{background:rgba(255,255,255,.16);border-radius:7px;padding:3px 12px;font-weight:600;margin-left:4px;font-size:12.5px}
.toast .act:hover{background:rgba(255,255,255,.26)}
details.opts>summary{cursor:pointer;list-style:none;font-weight:600;color:var(--brand);font-size:13px;padding:8px 0}
details.opts>summary::-webkit-details-marker{display:none}
details.opts>summary::before{content:'▸ '}
details.opts[open]>summary::before{content:'▾ '}
.arow{display:flex;gap:12px;align-items:center;padding:13px 16px;border:1px solid var(--line);border-left:3px solid var(--line);border-radius:10px;margin-bottom:9px;background:#fff}
.arow.imp{border-left-color:#F79009}
.arow.urg{border-left-color:#F04438;background:var(--red-bg);border-color:var(--red-bd);border-left-color:#F04438}
.vseg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.vseg button{padding:9px 20px;font-weight:600;color:var(--mut);background:#fff;font-size:13.5px;border-right:1px solid var(--line);display:inline-flex;gap:8px;align-items:center}
.vseg button:last-child{border-right:none}
.vseg button.on{background:var(--b800);color:#fff}
/* ---------- alerts / banners ---------- */
.al{display:flex;gap:11px;padding:13px 15px;border-radius:10px;border:1px solid;font-size:13px;align-items:flex-start;margin-bottom:16px;line-height:1.55}
.al svg{flex-shrink:0;margin-top:1px}
.al.warn{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.al.err{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.al.info{background:var(--b50);border-color:var(--b200);color:var(--brand)}
.al.ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.al b{font-weight:600}
.al .link{color:inherit;text-decoration:underline;font-weight:600}
/* ---------- misc ---------- */
.pgw{width:100%;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.pg{height:100%;background:var(--brand);border-radius:99px}
.pg.low{background:#F79009}
.empty{text-align:center;padding:58px 20px;color:var(--mut)}
.empty .eic{width:48px;height:48px;border-radius:12px;background:var(--b50);color:var(--brand);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:5px}
.empty p{font-size:13px;max-width:340px;margin:0 auto 16px;line-height:1.6}
.sk{background:linear-gradient(90deg,#F2F4F7 25%,#E4E7EC 37%,#F2F4F7 63%);background-size:400% 100%;animation:skm 1.2s infinite;border-radius:6px}
@keyframes skm{0%{background-position:100% 0}100%{background-position:0 0}}
.bulk{position:sticky;bottom:14px;display:flex;gap:8px;align-items:center;background:var(--b900);color:#fff;padding:10px 16px;border-radius:12px;box-shadow:var(--sh2);margin-top:14px;font-size:13.5px;z-index:30}
.bulk .btn{background:transparent;border-color:rgba(255,255,255,.25);color:#fff;box-shadow:none}
.bulk .btn:hover{background:rgba(255,255,255,.1)}
.drop{border:1.5px dashed #D0D5DD;border-radius:10px;padding:24px;text-align:center;color:var(--mut);background:var(--bg);font-size:13px;cursor:pointer;line-height:1.6}
.drop:hover{border-color:var(--b600);background:var(--b50)}
.drop b{color:var(--brand)}
.logo-sq{background:#0A0A0A;color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:700;line-height:1.25;flex-shrink:0}
.steps{display:flex;gap:8px;margin-bottom:22px}
.step{flex:1;display:flex;flex-direction:column;gap:8px;font-size:12.5px;color:var(--mut);font-weight:600}
.step .bar{height:4px;border-radius:99px;background:var(--line)}
.step.on{color:var(--brand)}.step.on .bar{background:var(--brand)}
.step.done{color:var(--sub)}.step.done .bar{background:var(--b600)}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.tsearch{display:flex;align-items:center;gap:8px;border:1px solid #D0D5DD;border-radius:8px;padding:8px 12px;color:var(--faint);background:#fff;box-shadow:var(--sh);width:300px}
.tsearch input{border:none;outline:none;flex:1;background:transparent}
.fsel{display:inline-flex;align-items:center;gap:7px;border:1px solid #D0D5DD;background:#fff;border-radius:8px;padding:8px 12px;font-weight:600;color:var(--sub);box-shadow:var(--sh);font-size:13px;cursor:pointer}
/* ---------- phone preview ---------- */
.phone{width:272px;border-radius:34px;background:#101828;padding:9px;box-shadow:var(--sh2);flex-shrink:0}
.pscr{background:linear-gradient(165deg,#4A3470,#221639);border-radius:26px;min-height:430px;padding:14px 12px;position:relative;overflow:hidden}
.pscr.light{background:#F7F6FA}
.pnotch{width:88px;height:20px;background:#000;border-radius:99px;margin:0 auto 16px}
.ptime{color:#fff;text-align:center;font-size:40px;font-weight:300;letter-spacing:1px}
.pdate{color:rgba(255,255,255,.75);text-align:center;font-size:12.5px;margin-bottom:18px}
.push{background:rgba(255,255,255,.94);border-radius:14px;padding:11px 12px;display:flex;gap:10px;align-items:flex-start;text-align:left}
.push .ai{width:34px;height:34px;border-radius:9px;background:var(--b800);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.push b{font-size:12.5px;display:block}
.push p{font-size:12px;color:#333;line-height:1.45;margin-top:1px}
.push .tm{font-size:10.5px;color:#888;margin-left:auto;flex-shrink:0}
.papp-bar{display:flex;align-items:center;gap:8px;padding:6px 4px 12px;color:var(--ink)}
.papp-bar b{font-size:15px}
.pcard{background:#fff;border-radius:14px;border:1px solid var(--line);padding:12px;margin-bottom:10px;text-align:left}

 {sec:'Organization',items:[['companies','Companies','building'],['employees','Employees','users'],['projects','Projects','folder']]},
 {sec:'Community',items:[['circles','Circles','circles'],['moderation','Posts & Moderation','flag',3]]},
 {sec:'Communications',items:[['notifications','Notifications','bell'],['newsletter','Newsletter Center','mail']]},
 {sec:'Engagement',items:[['courses','Courses','book'],['leaderboard','Leaderboard','trophy'],['market','Rewards & Market','gift']]},
 {sec:'Operations',items:[['support','Support Tickets','headset',12],['reports','Reports & Analytics','chart']]},
 {sec:'Administration',items:[['perms','Users & Permissions','key'],['audit','Audit Log','history'],['settings','Settings','gear']]},
];
const PARENT={company:'companies',projectForm:'projects',circle:'circles',notifCreate:'notifications'};
const SCREENS={};

function go(id,arg){
  if(id==='company'){S.company=arg||S.company||'ca'}
  if(id==='circle'){S.circle=arg!==undefined?arg:S.circle||0}
  if(id==='rules'){id='notifications';S.notifView='rules'}
  else if(id==='announcements'){id='notifications';S.notifView='messages';S.msgCat='news'}
  else if(id==='notifications'&&!arg){/* keep current sub-view state */}
  S.screen=id;render();document.getElementById('ct').scrollTop=0;
}
function render(){
  const active=PARENT[S.screen]||S.screen;
  document.getElementById('sbnav').innerHTML=NAV.map(g=>
    (g.sec?'<div class="sb-sec">'+g.sec+'</div>':'')+
    g.items.map(it=>'<button class="sb-item '+(active===it[0]?'on':'')+'" onclick="go(\''+it[0]+'\')">'+ic(it[2],17)+it[1]+(it[3]?'<span class="cnt">'+it[3]+'</span>':'')+'</button>').join('')
  ).join('');
  document.getElementById('tbright').innerHTML=
   '<details class="dd"><summary><button class="btn pri sm">'+ic('plus',15)+'Create'+ic('chev',14)+'</button></summary><div class="dd-menu">'
   +'<div class="lbl">Quick create</div>'
   +mi('user','New employee',"openAddEmployee(1)")
   +mi('folder','New project',"go('projectForm')")
   +mi('mega','News announcement',"openAnnouncement()")
   +mi('warn','Alert',"openCreateAlert()")
   +mi('bell','Notification',"go('notifCreate')")
   +mi('circles','New Circle',"openCreateCircle()")
   +mi('mail','New newsletter',"openNewsletterCreate()")
   +'</div></details>'
   +'<button class="btn sm" onclick="openEmpPreview(\'home\')">'+ic('ext',15)+'View employee app</button>'
   +'<div class="tb-sep"></div>'
   +'<button class="btn ghost sm">'+ic('globe',15)+'العربية</button>'
   +'<button class="ibtn" onclick="openAdminNotifs()">'+ic('bell',18)+'<span class="dot"></span></button>'
   +'<details class="dd"><summary>'+av(0,34)+'</summary><div class="dd-menu"><div style="padding:9px 10px 7px"><b style="font-size:13.5px">Wedad Alqithmi</b><div style="font-size:12px;color:var(--mut)">Super Admin · w.alqithmi@backyardex.com</div></div><div class="sep"></div>'+mi('user','My admin profile')+mi('gear','Preferences')+'<div class="sep"></div>'+mi('back','Sign out')+'</div></details>';
  document.getElementById('ct').innerHTML=(SCREENS[S.screen]||SCREENS.overview)();
}

/* ---------- helpers ---------- */
function prichip(p){return p==='Urgent'?chip('Urgent','red'):p==='Important'?chip('Important','amber'):chip('Normal','',false)}
function srcchip(s){return chip(s,s==='System'?'purple':s==='Automated'?'blue':s==='Circle activity'?'':'' ,false)}
function subbadge(s){return '<span class="chip purple" style="font-weight:600">'+s+'</span>'}
function trigchip(m){return m==='System-triggered'?chip('System-triggered','blue',false):m==='Admin-assisted'?chip('Admin-assisted','purple',false):chip('Manual','',false)}
function behchip(b){const m={A:['Toast · not stored',''],B:['Persistent in-app','purple'],C:['Push + persistent','amber'],D:['News / feed item','blue'],E:['Celebration','green']};return chip(m[b][0],m[b][1],false)}

  +'<div class="grid3">'
  +[['Issue 15','Just published',!empNewsSeen||true],['Issue 14','Read · 6 Jul',false],['Issue 13','Read · 1 Jun',false]]
  .map((n,i)=>'<div class="acard" style="'+(i===0?'border-color:var(--b200)':'')+'"><div class="thumb '+(i%2?'':'lite')+'" style="height:130px;display:flex;flex-direction:column;gap:5px"><div style="font-size:10px;letter-spacing:.13em;opacity:.75">AHD MONTHLY · عهد</div><div style="font-size:22px">'+n[0]+'</div>'+(i===0?'<div class="ovl-tr">'+chip('New','purple')+'</div>':'')+'</div><div class="abody"><b>Ahd Monthly — '+n[0]+'</b><div class="meta">'+n[1]+'</div></div></div>').join('')+'</div>'
  +'<div class="hint" style="margin-top:14px">The “New” badge stays on unseen issue cards until each one is opened.</div></div>';
 }else{
  body='<div style="max-width:860px"><div style="font-size:19px;font-weight:600;margin-bottom:4px">Good morning, Yazeed 👋</div><div class="psub" style="margin-bottom:20px">Here\'s what\'s happening across the group today.</div>'
  +(empNewsSeen?'':'<div class="al info" style="max-width:640px">'+ic('mail',15)+'<div><b>Notice the red dot on the Newsletter icon above</b> — Issue 15 was just published. The notification bell count is unaffected. Open the Newsletter icon to see the dot clear.</div></div>')
  +'<div class="grid3" style="margin-bottom:18px">'
  +[['🔥 Streak','12 days'],['⚡ Points','520'],['🪙 Coins','5,220']]
  .map(s=>'<div class="stat"><div class="sl">'+s[0]+'</div><div class="sv" style="font-size:22px">'+s[1]+'</div></div>').join('')+'</div>'
  +'<div class="card" style="padding:16px;margin-bottom:12px;border-color:var(--b200);background:var(--b50)"><b style="font-size:13.5px">📣 New project: Riyadh Innovation Summit 2026</b><div style="font-size:12.5px;color:var(--mut);margin-top:3px">Cultural Assets Group has published a new project. Explore its details and contributors.</div></div>'
  +'<div class="card" style="padding:16px"><b style="font-size:13.5px">Welcome Noura Alotaibi 👋</b><div style="font-size:12.5px;color:var(--mut);margin-top:3px">Noura joined Cultural Assets Group as a Product Analyst — say hello in the company Circle.</div></div></div>';
 }
 document.getElementById('emp').innerHTML=
  '<div class="pv-banner">'+ic('eye',16)+'<b>Previewing as employee</b><span class="chip">Yazeed Aljuhani · Sr. UX Designer · Backyard Symphony</span><span style="opacity:.7">This is exactly what employees see — admin controls are hidden.</span><button class="btn sm" onclick="closeEmpPreview()">'+ic('x',14)+'Exit preview</button></div>'
  +'<div class="pv-body"><aside class="esb"><div class="sb-logo" style="padding:2px 6px 16px"><span class="logo-word">Ahd</span><span class="logo-ar">عهد</span></div>'
  +nav.map(n=>'<button class="sb-item '+(n[0]===view?'on':'')+'" onclick="openEmpPreview(\''+n[0]+'\')">'+ic(n[2],16)+n[1]+'</button>').join('')
  +'<div class="sb-sec">Help & Support</div><button class="sb-item">'+ic('headset',16)+'Support Tickets</button></aside>'
  +'<div class="emain"><div class="etb"><span style="color:var(--mut);font-size:13px">'+(view==='company'?'Companies  ‹  Cultural Assets':view==='newsletter'?'Newsletter':'Ahd')+'</span>'
  +'<div style="margin-left:auto;display:flex;gap:12px;align-items:center"><span class="ptchip">⚡ 520 Points</span><span class="ptchip">🪙 5,220 Coins</span><span style="font-size:13px;font-weight:600">العربية</span>'
  /* Newsletter icon — its own red dot, separate from the bell */
  +'<button style="position:relative;display:inline-flex;cursor:pointer" title="Newsletter'+(empNewsSeen?'':' — 1 unseen issue')+'" onclick="openEmpPreview(\'newsletter\')">'+ic('mail',18)+(empNewsSeen?'':'<span style="position:absolute;top:-3px;right:-4px;width:9px;height:9px;border-radius:50%;background:#F04438;border:1.5px solid #fff"></span>')+'</button>'
  /* Notification bell — count never includes newsletters */
  +'<button style="position:relative;display:inline-flex;cursor:pointer" title="Notifications — 2 unread (newsletters never counted)" onclick="openEmpPreview(\'notifications\')">'+ic('bell',18)+'<span style="position:absolute;top:-6px;right:-7px;min-width:15px;height:15px;border-radius:99px;background:#F04438;border:1.5px solid #fff;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px">2</span></button>'
  +av(1,30)+'</div></div>'
  +'<div class="ect">'+body+'</div></div></div>';
 document.getElementById('emp').classList.add('show');
}
function closeEmpPreview(){document.getElementById('emp').classList.remove('show')}

/* ---------- keyboard ---------- */
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeEmpPreview()}});

/* ---------- init ---------- */
render();
</script>
</body>
</html>
